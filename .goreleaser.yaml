# .goreleaser.yaml
# See https://goreleaser.com for full documentation.
version: 2

project_name: mcp-ynab

before:
  hooks:
    - go mod tidy

builds:
  - id: mcp-ynab
    main: .
    binary: mcp-ynab
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.Version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

dockers:
  - image_templates:
      - "ghcr.io/bold-minds/mcp-ynab:{{ .Version }}-amd64"
      - "ghcr.io/bold-minds/mcp-ynab:latest-amd64"
    use: buildx
    goos: linux
    goarch: amd64
    dockerfile: Dockerfile.goreleaser
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.source=https://github.com/bold-minds/mcp-ynab"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.licenses=MIT"
  - image_templates:
      - "ghcr.io/bold-minds/mcp-ynab:{{ .Version }}-arm64"
      - "ghcr.io/bold-minds/mcp-ynab:latest-arm64"
    use: buildx
    goos: linux
    goarch: arm64
    dockerfile: Dockerfile.goreleaser
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.source=https://github.com/bold-minds/mcp-ynab"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.licenses=MIT"

docker_manifests:
  - name_template: "ghcr.io/bold-minds/mcp-ynab:{{ .Version }}"
    image_templates:
      - "ghcr.io/bold-minds/mcp-ynab:{{ .Version }}-amd64"
      - "ghcr.io/bold-minds/mcp-ynab:{{ .Version }}-arm64"
  - name_template: "ghcr.io/bold-minds/mcp-ynab:latest"
    image_templates:
      - "ghcr.io/bold-minds/mcp-ynab:latest-amd64"
      - "ghcr.io/bold-minds/mcp-ynab:latest-arm64"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "Merge pull request"
