name: Release

on:
  push:
    tags:
      - 'v*'

permissions: {}

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create GitHub Release, upload assets
      packages: write   # push to ghcr.io
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          fetch-depth: 0

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5.6.0
        with:
          go-version: '1.25.x'
          check-latest: true

      # Install syft so GoReleaser's sboms: stanza can produce CycloneDX
      # SBOMs per archive. Without this step the first tag push fails
      # with "syft: not found" because the hosted runner image does not
      # ship syft. Pinned to the v0.17.8 release of the sbom-action
      # download helper to match the rest of the workflow's supply-chain
      # discipline. Review finding H8.
      - name: Install syft
        uses: anchore/sbom-action/download-syft@f325610c9f50a54015d37c8d16cb3b0e2c8f4de0  # v0.17.8

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a  # v6.4.0
        with:
          distribution: goreleaser
          # Pin the GoReleaser binary to an explicit v2.x version
          # instead of "latest" so a release run cannot silently adopt
          # a new major line. Review finding H7.
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
