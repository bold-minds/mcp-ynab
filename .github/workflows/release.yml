name: Release

on:
  push:
    tags:
      - 'v*'

permissions: {}

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create GitHub Release, upload assets
      packages: write   # push to ghcr.io
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version: '1.25.x'
          check-latest: true

      # Install syft so GoReleaser's sboms: stanza can produce CycloneDX
      # SBOMs per archive. Without this step the first tag push fails
      # with "syft: not found" because the hosted runner image does not
      # ship syft. Pinned to the v0.17.8 release of the sbom-action
      # download helper to match the rest of the workflow's supply-chain
      # discipline. Review finding H8.
      - name: Install syft
        uses: anchore/sbom-action/download-syft@f325610c9f50a54015d37c8d16cb3b0e2c8f4de0  # v0.17.8

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29  # v7.0.0
        with:
          distribution: goreleaser
          # Pin the GoReleaser binary to an explicit v2.x version
          # instead of "latest" so a release run cannot silently adopt
          # a new major line. Review finding H7.
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
