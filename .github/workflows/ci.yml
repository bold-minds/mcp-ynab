name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Default-deny at the workflow level. Every job below restates its own
# minimal permissions explicitly (Scorecard TokenPermissionsID guidance).
permissions: {}

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          # Track the latest stable patch to pull in stdlib security fixes.
          go-version: '1.26.2'
          check-latest: true

      - name: Verify modules tidy
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test (race + shuffle + coverage)
        # -shuffle=on randomizes test order so order-sensitive tests
        # (e.g. env-mutation tests that forget t.Setenv) fail visibly in
        # CI instead of passing only when they happen to run first.
        # Review finding on -shuffle=on.
        run: go test -race -shuffle=on -covermode=atomic -coverprofile=coverage.out ./...

      - name: Coverage threshold gate
        # Review finding M13. Fail the build if total package coverage
        # drops below the documented floor. 70% is below current real
        # coverage to leave room for refactors but catches catastrophic
        # drops like a PR that deletes a whole test file. Adjust by
        # editing this step with intention.
        env:
          COVERAGE_FLOOR: "70.0"
        run: |
          total=$(go tool cover -func=coverage.out | awk '/^total:/ {print $3}' | tr -d '%')
          echo "Total coverage: ${total}% (floor: ${COVERAGE_FLOOR}%)"
          awk -v t="$total" -v f="$COVERAGE_FLOOR" 'BEGIN { exit (t+0 < f+0) ? 1 : 0 }' \
            || { echo "::error::coverage ${total}% < floor ${COVERAGE_FLOOR}%"; exit 1; }

      - name: Upload coverage
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: coverage
          path: coverage.out

  staticcheck:
    name: staticcheck
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version: '1.26.2'
          check-latest: true
      - name: Install staticcheck
        # Pinned to a commit SHA because Scorecard's PinnedDependencies
        # check doesn't recognize honnef's non-semver tag format (2026.1).
        # SHA corresponds to the 2026.1 release tag.
        run: go install honnef.co/go/tools/cmd/staticcheck@ff63afafc529279f454e02f1d060210bd4263951
      - run: staticcheck ./...

  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version: '1.26.2'
          check-latest: true
      - name: Install govulncheck
        # TODO: pin by commit SHA to match staticcheck and the rest of
        # the workflow's supply-chain discipline. The v1.1.4 tag is a
        # signed semver release from a trusted upstream (golang.org/x),
        # so the current risk is low, but a SHA pin matches the rest of
        # the workflow's defense-in-depth. Look up the SHA for the
        # v1.1.4 tag at https://github.com/golang/vuln/releases/tag/v1.1.4
        # before the next workflow touch-up. Review finding on
        # govulncheck SHA pin.
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
      - run: govulncheck ./...

  gosec:
    name: gosec
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version: '1.26.2'
          check-latest: true
      - name: Install gosec
        # TODO: pin by SHA once we confirm the exact upstream commit for
        # v2.25.0; leaving the pinned tag in place for now matches the
        # govulncheck step above. Review finding on missing gosec step.
        run: go install github.com/securego/gosec/v2/cmd/gosec@v2.25.0
      - run: gosec -quiet ./...
